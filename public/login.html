<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wiazart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6d28d9;
            --primary-light: #8b5cf6;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(109, 40, 217, 0.03), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.03), transparent 40%);
        }

        .login-box { 
            background: #fff; 
            padding: 48px; 
            border-radius: 32px; 
            width: 440px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }

        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-box {
            width: 64px; height: 64px; background: var(--primary); border-radius: 18px;
            display: flex; align-items: center; justify-content: center; color: #fff;
            margin: 0 auto 16px; box-shadow: 0 8px 16px rgba(109, 40, 217, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        .logo-text { 
            font-family: 'Outfit', sans-serif;
            font-size: 28px; font-weight: 800; color: var(--text-main);
        }

        .subtitle { color: var(--text-muted); font-size: 15px; margin-top: 4px; }

        .field { margin-bottom: 24px; }
        .field label { display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .field input { 
            width: 100%; padding: 14px 18px; background: #f8fafc; border: 1px solid var(--border); 
            border-radius: 14px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .field input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1); }

        .btn { 
            width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; 
            border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(109, 40, 217, 0.3); background: var(--primary-light); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .error { 
            background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; 
            padding: 12px 16px; border-radius: 12px; font-size: 14px; margin-bottom: 24px; display: none; text-align: center;
        }

        .links { text-align: center; margin-top: 32px; font-size: 14px; color: var(--text-muted); }
        .links a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .links a:hover { text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        @media (max-width: 480px) { .login-box { width: 90%; padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <div class="logo-box"><i data-lucide="zap"></i></div>
            <div class="logo-text">Wiazart</div>
            <div class="subtitle">Access your terminal interface</div>
        </div>

        <div id="error" class="error"></div>
        
        <form id="loginForm">
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@wiazart.com" required>
            </div>
            <div class="field">
                <label>Master Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="links">New to Wiazart? <a href="/#pricing">Pick a Plan</a></div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById('error');
            const btn = e.target.querySelector('button');
            
            errDiv.style.display = 'none';
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('wiazart_token', data.token);
                    localStorage.setItem('wiazart_user', JSON.stringify(data.user));
                    
                    document.querySelector('.login-box').style.opacity = '0';
                    document.querySelector('.login-box').style.transform = 'translateY(-20px)';
                    document.querySelector('.login-box').style.transition = 'all 0.5s ease';
                    
                    setTimeout(() => {
                        window.location.href = data.user.isAdmin ? '/admin' : '/dashboard';
                    }, 500);
                } else {
                    errDiv.textContent = data.error || 'Authentication failed';
                    errDiv.style.display = 'block';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                errDiv.textContent = 'Connection error. Is the gateway online?';
                errDiv.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
