<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wiazart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #fff; padding: 48px; border-radius: 20px; width: 420px; border: 1px solid #e5e5e5; }
        .logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .field input { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; transition: border-color .2s; }
        .field input:focus { border-color: #1a1a1a; }
        .btn { width: 100%; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: background .2s; margin-top: 8px; }
        .btn:hover { background: #333; }
        .error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; }
        .links { text-align: center; margin-top: 24px; font-size: 13px; color: #888; }
        .links a { color: #1a1a1a; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">wiazart</div>
        <div class="subtitle">Sign in to your account</div>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="links">Don't have an account? <a href="/#pricing">View Plans</a></div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById('error');
            errDiv.style.display = 'none';
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('wiazart_token', data.token);
                localStorage.setItem('wiazart_user', JSON.stringify(data.user));
                window.location.href = data.user.isAdmin ? '/admin' : '/dashboard';
            } else {
                errDiv.textContent = data.error;
                errDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
