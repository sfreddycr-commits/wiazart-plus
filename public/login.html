<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wiazart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0514;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-muted: #8c8c9e;
            --accent-primary: #8a2be2;
            --accent-secondary: #00ffff;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main);
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.1), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.05), transparent 30%);
        }

        /* ── Glassmorphism Card ── */
        .login-box { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px; 
            border-radius: 32px; 
            width: 440px; 
            border: 1px solid var(--border-glass); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--accent-primary), transparent, var(--accent-secondary));
            z-index: -1;
            border-radius: 34px;
            opacity: 0.15;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 15px rgba(138,43,226,0.5));
            animation: float 6s ease-in-out infinite;
        }

        .logo-text { 
            font-size: 28px; 
            font-weight: 800; 
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, #b3b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 15px; 
            margin-top: 4px;
            font-family: 'Inter', sans-serif;
        }

        .field { margin-bottom: 24px; }
        .field label { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 8px; 
            padding-left: 4px;
        }
        
        .field input { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass); 
            border-radius: 14px; 
            font-size: 16px; 
            color: #fff;
            outline: none; 
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .field input:focus { 
            border-color: var(--accent-primary); 
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(138,43,226,0.2);
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--accent-primary), #5a189a); 
            color: #fff; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.4);
            filter: brightness(1.1);
        }
        
        .btn:active { transform: translateY(0); }

        .error { 
            background: rgba(220, 38, 38, 0.1); 
            color: #ff8080; 
            border: 1px solid rgba(220, 38, 38, 0.2); 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            margin-bottom: 24px; 
            display: none; 
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .links { 
            text-align: center; 
            margin-top: 32px; 
            font-size: 14px; 
            color: var(--text-muted); 
            font-family: 'Inter', sans-serif;
        }
        .links a { 
            color: var(--accent-secondary); 
            font-weight: 600; 
            transition: all 0.2s;
        }
        .links a:hover { text-decoration: underline; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 480px) {
            .login-box { width: 90%; padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="/logo.png" alt="Wiazart" class="logo-img">
            <div class="logo-text">Wiazart</div>
            <div class="subtitle">Enter the realm of creation</div>
        </div>

        <div id="error" class="error"></div>
        
        <form id="loginForm">
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@wiazart.com" required>
            </div>
            <div class="field">
                <label>Master Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Access Terminal</button>
        </form>
        
        <div class="links">New to Wiazart? <a href="/#pricing">Pick a Plan</a></div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById('error');
            const btn = e.target.querySelector('button');
            
            errDiv.style.display = 'none';
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('wiazart_token', data.token);
                    localStorage.setItem('wiazart_user', JSON.stringify(data.user));
                    
                    // Smooth transition
                    document.querySelector('.login-box').style.opacity = '0';
                    document.querySelector('.login-box').style.transform = 'translateY(-20px)';
                    document.querySelector('.login-box').style.transition = 'all 0.5s ease';
                    
                    setTimeout(() => {
                        window.location.href = data.user.isAdmin ? '/admin' : '/dashboard';
                    }, 500);
                } else {
                    errDiv.textContent = data.error || 'Authentication failed';
                    errDiv.style.display = 'block';
                    btn.textContent = 'Access Terminal';
                    btn.disabled = false;
                }
            } catch (err) {
                errDiv.textContent = 'Connection error. Is the gateway online?';
                errDiv.style.display = 'block';
                btn.textContent = 'Access Terminal';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
